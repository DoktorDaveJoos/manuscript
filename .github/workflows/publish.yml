name: publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Copy environment file
        run: cp .env.example .env

      - name: Create database file
        run: touch database/database.sqlite

      - name: Get Composer cache directory
        id: composer-cache
        shell: bash
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Apply NativePHP vendor patches
        run: bash scripts/nativephp-patches/apply.sh

      # nativephp/desktop is pinned to a dev branch that ships package.json and
      # package-lock.json out of sync, so native:publish's internal `npm ci`
      # fails and the rest of the build runs without node_modules — then
      # silently exits green with no DMG produced. Reconcile the lockfile here.
      - name: Reconcile electron lockfile
        run: |
          cd vendor/nativephp/desktop/resources/electron
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      # APP_KEY must stay stable across releases so persisted encrypted columns
      # (e.g. ai_settings.api_key) remain decryptable after users auto-update.
      # See Sentry issue 112306879 — regenerating the key per build orphaned
      # every user's stored AI provider credentials.
      - name: Set version and secrets in .env
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
          SENTRY_LARAVEL_DSN: ${{ secrets.SENTRY_LARAVEL_DSN }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_APTABASE_KEY: A-EU-5078183699
          POLAR_ACCESS_TOKEN: ${{ secrets.POLAR_ACCESS_TOKEN }}
          POLAR_ORGANIZATION_ID: ${{ secrets.POLAR_ORGANIZATION_ID }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i '' "s/APP_ENV=.*/APP_ENV=production/" .env
          sed -i '' "s/APP_DEBUG=.*/APP_DEBUG=false/" .env
          sed -i '' "s/LOG_LEVEL=.*/LOG_LEVEL=error/" .env
          sed -i '' "s/NATIVEPHP_APP_VERSION=.*/NATIVEPHP_APP_VERSION=${VERSION}/" .env
          sed -i '' "s|APP_KEY=.*|APP_KEY=${APP_KEY}|" .env
          sed -i '' "s|SENTRY_LARAVEL_DSN=.*|SENTRY_LARAVEL_DSN=${SENTRY_LARAVEL_DSN}|" .env
          sed -i '' "s|VITE_SENTRY_DSN=.*|VITE_SENTRY_DSN=${VITE_SENTRY_DSN}|" .env
          sed -i '' "s|VITE_APTABASE_KEY=.*|VITE_APTABASE_KEY=${VITE_APTABASE_KEY}|" .env
          sed -i '' "s|POLAR_ACCESS_TOKEN=.*|POLAR_ACCESS_TOKEN=${POLAR_ACCESS_TOKEN}|" .env
          sed -i '' "s|POLAR_ORGANIZATION_ID=.*|POLAR_ORGANIZATION_ID=${POLAR_ORGANIZATION_ID}|" .env

      - name: Verify release secrets are configured
        shell: bash
        run: |
          if ! grep -q '^APP_KEY=base64:' .env; then
            echo "::error::APP_KEY secret is empty or malformed. Generate one with 'php artisan key:generate --show' and store it as the APP_KEY repo secret."
            exit 1
          fi
          if ! grep -q 'SENTRY_LARAVEL_DSN=https' .env; then
            echo "::error::SENTRY_LARAVEL_DSN is empty or missing. Check GitHub secrets."
            exit 1
          fi

      - name: Build frontend assets
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_APTABASE_KEY: A-EU-5078183699
        run: npm run build

      - name: Install Apple signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db
          security find-identity -v -p codesigning $KEYCHAIN_PATH

      - name: Fix electron-builder repo detection
        run: node -e "const p=JSON.parse(require('fs').readFileSync('vendor/nativephp/desktop/resources/electron/package.json','utf8')); p.repository={type:'git',url:'https://github.com/DoktorDaveJoos/manuscript.git'}; require('fs').writeFileSync('vendor/nativephp/desktop/resources/electron/package.json', JSON.stringify(p, null, 4))"

      - name: Strip version from artifact names
        run: |
          sed -i '' "s/'-\${version}-setup.\${ext}'/'-setup.\${ext}'/g" vendor/nativephp/desktop/resources/electron/electron-builder.mjs
          sed -i '' "s/'-\${version}-\${arch}.\${ext}'/'-\${arch}.\${ext}'/g" vendor/nativephp/desktop/resources/electron/electron-builder.mjs
          sed -i '' "s/'-\${version}.\${ext}'/'.\${ext}'/g" vendor/nativephp/desktop/resources/electron/electron-builder.mjs

      - name: Build and publish (arm64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NATIVEPHP_UPDATER_PROVIDER: github
          GITHUB_REPO: manuscript
          GITHUB_OWNER: DoktorDaveJoos
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RELEASE_TYPE: draft
          NATIVEPHP_APPLE_ID: ${{ secrets.NATIVEPHP_APPLE_ID }}
          NATIVEPHP_APPLE_ID_PASS: ${{ secrets.NATIVEPHP_APPLE_ID_PASS }}
          NATIVEPHP_APPLE_TEAM_ID: ${{ secrets.NATIVEPHP_APPLE_TEAM_ID }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_APTABASE_KEY: A-EU-5078183699
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_RELEASE: ${{ github.ref_name }}
        run: php artisan native:publish mac arm64 --no-interaction

      - name: Build and publish (x64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NATIVEPHP_UPDATER_PROVIDER: github
          GITHUB_REPO: manuscript
          GITHUB_OWNER: DoktorDaveJoos
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RELEASE_TYPE: draft
          NATIVEPHP_APPLE_ID: ${{ secrets.NATIVEPHP_APPLE_ID }}
          NATIVEPHP_APPLE_ID_PASS: ${{ secrets.NATIVEPHP_APPLE_ID_PASS }}
          NATIVEPHP_APPLE_TEAM_ID: ${{ secrets.NATIVEPHP_APPLE_TEAM_ID }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_APTABASE_KEY: A-EU-5078183699
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_RELEASE: ${{ github.ref_name }}
        run: php artisan native:publish mac x64 --no-interaction

      - name: Verify packaged startup recovery
        shell: bash
        run: |
          DIST=nativephp/electron/dist
          [ -d "$DIST" ] || DIST=vendor/nativephp/desktop/resources/electron/dist
          ELECTRON_ROOT="${DIST%/dist}"
          ASAR_BIN="$ELECTRON_ROOT/node_modules/@electron/asar/bin/asar.js"

          if [ ! -f "$ASAR_BIN" ]; then
            echo "::error::Cannot inspect packaged app.asar; @electron/asar is missing."
            exit 1
          fi

          ARM64_APP="$DIST/mac-arm64/Manuscript.app"
          X64_APP="$DIST/mac/Manuscript.app"

          for APP in "$ARM64_APP" "$X64_APP"; do
            if [ ! -d "$APP" ]; then
              echo "::error::Expected packaged app is missing: $APP"
              exit 1
            fi

            EXTRACT_DIR="$RUNNER_TEMP/manuscript-asar-$RANDOM"
            node "$ASAR_BIN" extract "$APP/Contents/Resources/app.asar" "$EXTRACT_DIR"
            MAIN="$EXTRACT_DIR/out/main/index.js"
            PROVIDER="$APP/Contents/Resources/build/app/vendor/nativephp/desktop/src/NativeServiceProvider.php"
            CHILD_PROCESS="$APP/Contents/Resources/build/app/vendor/nativephp/desktop/src/ChildProcess.php"

            for NEEDLE in nativephp-recovery prepareRecoveryLaunch notifyLaravelOrThrow waitForMainWindow getWindowLoadPromise nativephp-child-process-ready before-quit-for-update isQuitting bootstrapPromise serializeProcess EADDRINUSE; do
              if ! grep -Fq "$NEEDLE" "$MAIN"; then
                echo "::error::$NEEDLE is missing from packaged Electron main process in $APP."
                exit 1
              fi
            done

            if [ ! -f "$PROVIDER" ] || ! grep -Fq 'reconcileRuntimeConfig' "$PROVIDER" || ! grep -Fq 'NATIVEPHP_DATABASE_PATH' "$PROVIDER" || ! grep -Fq 'catch (\Throwable $exception)' "$PROVIDER"; then
              echo "::error::NativePHP runtime startup hardening is missing from $APP."
              exit 1
            fi
            if [ ! -f "$CHILD_PROCESS" ] || ! grep -Fq 'NativePHP child process failed to start:' "$CHILD_PROCESS"; then
              echo "::error::NativePHP child-process startup acknowledgment is missing from $APP."
              exit 1
            fi

            rm -rf "$EXTRACT_DIR"
            echo "Startup recovery verified in $APP"
          done

      # native:publish can silently exit 0 if its internal npm steps fail
      # (e.g. cross-env missing because npm ci errored). Without this guard
      # the workflow goes green with no DMG uploaded.
      - name: Verify DMG artifacts were produced
        shell: bash
        run: |
          # NativePHP stages the electron app at <repo>/nativephp/electron at
          # build time; older desktop versions emitted to the vendor path.
          DIST=nativephp/electron/dist
          [ -d "$DIST" ] || DIST=vendor/nativephp/desktop/resources/electron/dist

          for DMG in "$DIST/Manuscript-arm64.dmg" "$DIST/Manuscript-x64.dmg"; do
            if [ ! -f "$DMG" ]; then
              echo "::error::Expected macOS artifact is missing: $DMG"
              ls -la "$DIST" 2>/dev/null || echo "(dist/ does not exist)"
              exit 1
            fi

            echo "macOS DMG produced: $DMG"
          done

      # Speech input ships a whisper.cpp binary via NativePHP's extras/
      # mechanism. If it goes missing from the bundle (extras/ dropped, builder
      # config changed) or loses its signature, the mic feature silently
      # degrades for every user of that release — fail the build instead.
      - name: Verify whisper-cli is bundled and signed
        shell: bash
        run: |
          DIST=nativephp/electron/dist
          [ -d "$DIST" ] || DIST=vendor/nativephp/desktop/resources/electron/dist
          FOUND=0
          for APP in "$DIST"/mac*/*.app; do
            [ -d "$APP" ] || continue
            FOUND=1
            BIN="$APP/Contents/extras/bin/mac/whisper-cli"
            if [ ! -f "$BIN" ]; then
              echo "::error::whisper-cli missing from $APP — extras/ was not bundled."
              exit 1
            fi
            if ! codesign --verify --strict "$BIN"; then
              echo "::error::whisper-cli in $APP is not validly signed."
              exit 1
            fi
            echo "whisper-cli present and signed in $APP"
          done
          if [ "$FOUND" = "0" ]; then
            echo "::error::No .app bundles found under $DIST to verify."
            exit 1
          fi

  build-windows:
    needs: build-macos
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          extensions: fileinfo, gd, zip, sockets

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Copy environment file
        run: Copy-Item .env.example .env

      - name: Create database file
        run: New-Item -ItemType File -Path database\database.sqlite -Force

      - name: Get Composer cache directory
        id: composer-cache
        shell: bash
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Apply NativePHP vendor patches
        shell: bash
        run: bash scripts/nativephp-patches/apply.sh

      # nativephp/desktop is pinned to a dev branch that ships package.json and
      # package-lock.json out of sync, so native:publish's internal `npm ci`
      # fails and the rest of the build runs without node_modules — then
      # silently exits green with no DMG produced. Reconcile the lockfile here.
      - name: Reconcile electron lockfile
        shell: bash
        run: |
          cd vendor/nativephp/desktop/resources/electron
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      # APP_KEY must stay stable across releases so persisted encrypted columns
      # (e.g. ai_settings.api_key) remain decryptable after users auto-update.
      # See Sentry issue 112306879 — regenerating the key per build orphaned
      # every user's stored AI provider credentials.
      - name: Set version and secrets in .env
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
          SENTRY_LARAVEL_DSN: ${{ secrets.SENTRY_LARAVEL_DSN }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_APTABASE_KEY: A-EU-5078183699
          POLAR_ACCESS_TOKEN: ${{ secrets.POLAR_ACCESS_TOKEN }}
          POLAR_ORGANIZATION_ID: ${{ secrets.POLAR_ORGANIZATION_ID }}
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/APP_ENV=.*/APP_ENV=production/" .env
          sed -i "s/APP_DEBUG=.*/APP_DEBUG=false/" .env
          sed -i "s/LOG_LEVEL=.*/LOG_LEVEL=error/" .env
          sed -i "s/NATIVEPHP_APP_VERSION=.*/NATIVEPHP_APP_VERSION=${VERSION}/" .env
          sed -i "s|APP_KEY=.*|APP_KEY=${APP_KEY}|" .env
          sed -i "s|SENTRY_LARAVEL_DSN=.*|SENTRY_LARAVEL_DSN=${SENTRY_LARAVEL_DSN}|" .env
          sed -i "s|VITE_SENTRY_DSN=.*|VITE_SENTRY_DSN=${VITE_SENTRY_DSN}|" .env
          sed -i "s|VITE_APTABASE_KEY=.*|VITE_APTABASE_KEY=${VITE_APTABASE_KEY}|" .env
          sed -i "s|POLAR_ACCESS_TOKEN=.*|POLAR_ACCESS_TOKEN=${POLAR_ACCESS_TOKEN}|" .env
          sed -i "s|POLAR_ORGANIZATION_ID=.*|POLAR_ORGANIZATION_ID=${POLAR_ORGANIZATION_ID}|" .env

      - name: Verify release secrets are configured
        shell: bash
        run: |
          if ! grep -q '^APP_KEY=base64:' .env; then
            echo "::error::APP_KEY secret is empty or malformed. Generate one with 'php artisan key:generate --show' and store it as the APP_KEY repo secret."
            exit 1
          fi
          if ! grep -q 'SENTRY_LARAVEL_DSN=https' .env; then
            echo "::error::SENTRY_LARAVEL_DSN is empty or missing. Check GitHub secrets."
            exit 1
          fi

      - name: Build frontend assets
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_APTABASE_KEY: A-EU-5078183699
        run: npm run build

      - name: Fix electron-builder repo detection
        run: node -e "const p=JSON.parse(require('fs').readFileSync('vendor/nativephp/desktop/resources/electron/package.json','utf8')); p.repository={type:'git',url:'https://github.com/DoktorDaveJoos/manuscript.git'}; require('fs').writeFileSync('vendor/nativephp/desktop/resources/electron/package.json', JSON.stringify(p, null, 4))"

      - name: Strip version from artifact names
        shell: bash
        run: |
          sed -i "s/'-\${version}-setup.\${ext}'/'-setup.\${ext}'/g" vendor/nativephp/desktop/resources/electron/electron-builder.mjs
          sed -i "s/'-\${version}-\${arch}.\${ext}'/'-\${arch}.\${ext}'/g" vendor/nativephp/desktop/resources/electron/electron-builder.mjs
          sed -i "s/'-\${version}.\${ext}'/'.\${ext}'/g" vendor/nativephp/desktop/resources/electron/electron-builder.mjs

      - name: Build and publish (x64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NATIVEPHP_UPDATER_PROVIDER: github
          GITHUB_REPO: manuscript
          GITHUB_OWNER: DoktorDaveJoos
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RELEASE_TYPE: draft
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_APTABASE_KEY: A-EU-5078183699
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_RELEASE: ${{ github.ref_name }}
        run: php artisan native:publish win x64 --no-interaction

      # native:publish can silently exit 0 if its internal npm steps fail
      # (e.g. cross-env missing because npm ci errored). Without this guard
      # the workflow goes green with no installer uploaded.
      - name: Verify installer artifacts were produced
        shell: bash
        run: |
          # NativePHP stages the electron app at <repo>/nativephp/electron at
          # build time; older desktop versions emitted to the vendor path.
          DIST=nativephp/electron/dist
          [ -d "$DIST" ] || DIST=vendor/nativephp/desktop/resources/electron/dist
          if [ ! -d "$DIST" ] || [ -z "$(find $DIST -maxdepth 2 -type f \( -name '*.exe' -o -name '*.msi' \) 2>/dev/null)" ]; then
            echo "::error::No .exe/.msi artifacts in $DIST — native:publish silently failed."
            ls -la "$DIST" 2>/dev/null || echo "(dist/ does not exist)"
            exit 1
          fi
          echo "Windows installers produced:"
          find "$DIST" -maxdepth 2 -type f \( -name '*.exe' -o -name '*.msi' \)
