name: publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node dependencies
        run: npm ci

      - name: Copy environment file
        run: cp .env.example .env

      - name: Create database file
        run: touch database/database.sqlite

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Apply NativePHP vendor patches
        run: bash scripts/nativephp-patches/apply.sh

      # nativephp/desktop is pinned to a dev branch that ships package.json and
      # package-lock.json out of sync, so native:publish's internal `npm ci`
      # fails and the rest of the build runs without node_modules — then
      # silently exits green with no DMG produced. Reconcile the lockfile here.
      - name: Reconcile electron lockfile
        run: |
          cd vendor/nativephp/desktop/resources/electron
          npm install --package-lock-only --no-audit --no-fund

      - name: Generate application key
        run: php artisan key:generate

      - name: Set version and secrets in .env
        env:
          SENTRY_LARAVEL_DSN: ${{ secrets.SENTRY_LARAVEL_DSN }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          POLAR_ACCESS_TOKEN: ${{ secrets.POLAR_ACCESS_TOKEN }}
          POLAR_ORGANIZATION_ID: ${{ secrets.POLAR_ORGANIZATION_ID }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i '' "s/APP_ENV=.*/APP_ENV=production/" .env
          sed -i '' "s/APP_DEBUG=.*/APP_DEBUG=false/" .env
          sed -i '' "s/LOG_LEVEL=.*/LOG_LEVEL=error/" .env
          sed -i '' "s/NATIVEPHP_APP_VERSION=.*/NATIVEPHP_APP_VERSION=${VERSION}/" .env
          sed -i '' "s|SENTRY_LARAVEL_DSN=.*|SENTRY_LARAVEL_DSN=${SENTRY_LARAVEL_DSN}|" .env
          sed -i '' "s|VITE_SENTRY_DSN=.*|VITE_SENTRY_DSN=${VITE_SENTRY_DSN}|" .env
          sed -i '' "s|POLAR_ACCESS_TOKEN=.*|POLAR_ACCESS_TOKEN=${POLAR_ACCESS_TOKEN}|" .env
          sed -i '' "s|POLAR_ORGANIZATION_ID=.*|POLAR_ORGANIZATION_ID=${POLAR_ORGANIZATION_ID}|" .env

      - name: Verify Sentry DSN is configured
        shell: bash
        run: |
          if ! grep -q 'SENTRY_LARAVEL_DSN=https' .env; then
            echo "::error::SENTRY_LARAVEL_DSN is empty or missing. Check GitHub secrets."
            exit 1
          fi

      - name: Build frontend assets
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: npm run build

      - name: Install Apple signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db
          security find-identity -v -p codesigning $KEYCHAIN_PATH

      - name: Fix electron-builder repo detection
        run: node -e "const p=JSON.parse(require('fs').readFileSync('vendor/nativephp/desktop/resources/electron/package.json','utf8')); p.repository={type:'git',url:'https://github.com/DoktorDaveJoos/manuscript.git'}; require('fs').writeFileSync('vendor/nativephp/desktop/resources/electron/package.json', JSON.stringify(p, null, 4))"

      - name: Strip version from artifact names
        run: |
          sed -i '' "s/'-\${version}-setup.\${ext}'/'-setup.\${ext}'/g" vendor/nativephp/desktop/resources/electron/electron-builder.mjs
          sed -i '' "s/'-\${version}-\${arch}.\${ext}'/'-\${arch}.\${ext}'/g" vendor/nativephp/desktop/resources/electron/electron-builder.mjs
          sed -i '' "s/'-\${version}.\${ext}'/'.\${ext}'/g" vendor/nativephp/desktop/resources/electron/electron-builder.mjs

      - name: Build and publish (arm64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NATIVEPHP_UPDATER_PROVIDER: github
          GITHUB_REPO: manuscript
          GITHUB_OWNER: DoktorDaveJoos
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RELEASE_TYPE: draft
          NATIVEPHP_APPLE_ID: ${{ secrets.NATIVEPHP_APPLE_ID }}
          NATIVEPHP_APPLE_ID_PASS: ${{ secrets.NATIVEPHP_APPLE_ID_PASS }}
          NATIVEPHP_APPLE_TEAM_ID: ${{ secrets.NATIVEPHP_APPLE_TEAM_ID }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_RELEASE: ${{ github.ref_name }}
        run: php artisan native:publish mac arm64 --no-interaction

      - name: Build and publish (x64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NATIVEPHP_UPDATER_PROVIDER: github
          GITHUB_REPO: manuscript
          GITHUB_OWNER: DoktorDaveJoos
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RELEASE_TYPE: draft
          NATIVEPHP_APPLE_ID: ${{ secrets.NATIVEPHP_APPLE_ID }}
          NATIVEPHP_APPLE_ID_PASS: ${{ secrets.NATIVEPHP_APPLE_ID_PASS }}
          NATIVEPHP_APPLE_TEAM_ID: ${{ secrets.NATIVEPHP_APPLE_TEAM_ID }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_RELEASE: ${{ github.ref_name }}
        run: php artisan native:publish mac x64 --no-interaction

      # native:publish can silently exit 0 if its internal npm steps fail
      # (e.g. cross-env missing because npm ci errored). Without this guard
      # the workflow goes green with no DMG uploaded.
      - name: Verify DMG artifacts were produced
        shell: bash
        run: |
          DIST=vendor/nativephp/desktop/resources/electron/dist
          if [ ! -d "$DIST" ] || [ -z "$(find $DIST -maxdepth 2 -type f -name '*.dmg' 2>/dev/null)" ]; then
            echo "::error::No .dmg artifacts in $DIST — native:publish silently failed."
            ls -la "$DIST" 2>/dev/null || echo "(dist/ does not exist)"
            exit 1
          fi
          echo "macOS DMGs produced:"
          find "$DIST" -maxdepth 2 -type f -name '*.dmg'

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          extensions: fileinfo, gd, zip, sockets

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node dependencies
        run: npm ci

      - name: Copy environment file
        run: Copy-Item .env.example .env

      - name: Create database file
        run: New-Item -ItemType File -Path database\database.sqlite -Force

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Apply NativePHP vendor patches
        shell: bash
        run: bash scripts/nativephp-patches/apply.sh

      # nativephp/desktop is pinned to a dev branch that ships package.json and
      # package-lock.json out of sync, so native:publish's internal `npm ci`
      # fails and the rest of the build runs without node_modules — then
      # silently exits green with no DMG produced. Reconcile the lockfile here.
      - name: Reconcile electron lockfile
        shell: bash
        run: |
          cd vendor/nativephp/desktop/resources/electron
          npm install --package-lock-only --no-audit --no-fund

      - name: Generate application key
        run: php artisan key:generate

      - name: Set version and secrets in .env
        env:
          SENTRY_LARAVEL_DSN: ${{ secrets.SENTRY_LARAVEL_DSN }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          POLAR_ACCESS_TOKEN: ${{ secrets.POLAR_ACCESS_TOKEN }}
          POLAR_ORGANIZATION_ID: ${{ secrets.POLAR_ORGANIZATION_ID }}
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/APP_ENV=.*/APP_ENV=production/" .env
          sed -i "s/APP_DEBUG=.*/APP_DEBUG=false/" .env
          sed -i "s/LOG_LEVEL=.*/LOG_LEVEL=error/" .env
          sed -i "s/NATIVEPHP_APP_VERSION=.*/NATIVEPHP_APP_VERSION=${VERSION}/" .env
          sed -i "s|SENTRY_LARAVEL_DSN=.*|SENTRY_LARAVEL_DSN=${SENTRY_LARAVEL_DSN}|" .env
          sed -i "s|VITE_SENTRY_DSN=.*|VITE_SENTRY_DSN=${VITE_SENTRY_DSN}|" .env
          sed -i "s|POLAR_ACCESS_TOKEN=.*|POLAR_ACCESS_TOKEN=${POLAR_ACCESS_TOKEN}|" .env
          sed -i "s|POLAR_ORGANIZATION_ID=.*|POLAR_ORGANIZATION_ID=${POLAR_ORGANIZATION_ID}|" .env

      - name: Verify Sentry DSN is configured
        shell: bash
        run: |
          if ! grep -q 'SENTRY_LARAVEL_DSN=https' .env; then
            echo "::error::SENTRY_LARAVEL_DSN is empty or missing. Check GitHub secrets."
            exit 1
          fi

      - name: Build frontend assets
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: npm run build

      - name: Fix electron-builder repo detection
        run: node -e "const p=JSON.parse(require('fs').readFileSync('vendor/nativephp/desktop/resources/electron/package.json','utf8')); p.repository={type:'git',url:'https://github.com/DoktorDaveJoos/manuscript.git'}; require('fs').writeFileSync('vendor/nativephp/desktop/resources/electron/package.json', JSON.stringify(p, null, 4))"

      - name: Strip version from artifact names
        shell: bash
        run: |
          sed -i "s/'-\${version}-setup.\${ext}'/'-setup.\${ext}'/g" vendor/nativephp/desktop/resources/electron/electron-builder.mjs
          sed -i "s/'-\${version}-\${arch}.\${ext}'/'-\${arch}.\${ext}'/g" vendor/nativephp/desktop/resources/electron/electron-builder.mjs
          sed -i "s/'-\${version}.\${ext}'/'.\${ext}'/g" vendor/nativephp/desktop/resources/electron/electron-builder.mjs

      - name: Build and publish (x64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NATIVEPHP_UPDATER_PROVIDER: github
          GITHUB_REPO: manuscript
          GITHUB_OWNER: DoktorDaveJoos
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RELEASE_TYPE: draft
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_RELEASE: ${{ github.ref_name }}
        run: php artisan native:publish win x64 --no-interaction

      # native:publish can silently exit 0 if its internal npm steps fail
      # (e.g. cross-env missing because npm ci errored). Without this guard
      # the workflow goes green with no installer uploaded.
      - name: Verify installer artifacts were produced
        shell: bash
        run: |
          DIST=vendor/nativephp/desktop/resources/electron/dist
          if [ ! -d "$DIST" ] || [ -z "$(find $DIST -maxdepth 2 -type f \( -name '*.exe' -o -name '*.msi' \) 2>/dev/null)" ]; then
            echo "::error::No .exe/.msi artifacts in $DIST — native:publish silently failed."
            ls -la "$DIST" 2>/dev/null || echo "(dist/ does not exist)"
            exit 1
          fi
          echo "Windows installers produced:"
          find "$DIST" -maxdepth 2 -type f \( -name '*.exe' -o -name '*.msi' \)
