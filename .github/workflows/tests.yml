name: tests

on:
  push:
    branches:
      - dev
      - develop
      - main
      - master
      - workos
  pull_request:
    branches:
      - dev
      - develop
      - main
      - master
      - workos

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # PHP 8.4 only: the app ships as a NativePHP desktop bundle pinned to
      # the 8.4 runtime, so other PHP versions are not deploy targets.
      # pcov over xdebug: same clover output, a fraction of the runtime.
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: pcov

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      # No npm install / vite build / Playwright here: TestCase calls
      # withoutVite(), and tests/Browser is not part of the phpunit
      # testsuites, so the suite has no dependency on built assets.
      - name: Tests
        run: ./vendor/bin/pest --parallel --coverage --coverage-clover=coverage.xml

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
